<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forne Family Email Signature</title>
  </head>
  <body style="margin:0; padding:16px; background-color:#ffffff;">
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        width:100%;
        max-width:640px;
        border-collapse:collapse;
        background-color:#ffffff;
        border:1px solid #d7e4ef;
        border-radius:16px;
        overflow:hidden;
        font-family:Georgia, 'Times New Roman', serif;
      "
    >
      <tr>
        <td style="padding:20px 24px 18px 24px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse;">
            <tr>
              <td style="vertical-align:top; padding-right:22px; width:210px;">
                <div
                  style="
                    display:inline-block;
                    padding:4px 0 0 0;
                    color:#2e2a24;
                    font-family:'Cormorant Garamond', Georgia, serif;
                    font-size:40px;
                    font-style:italic;
                    font-weight:300;
                    letter-spacing:0.16em;
                    line-height:0.95;
                    text-transform:lowercase;
                    white-space:nowrap;
                  "
                >
                  Fornè
                </div>
                <div style="width:48px; height:1px; background-color:rgba(47,111,163,0.45); margin:12px 0 10px 0;"></div>
                <div
                  style="
                    color:#2f6fa3;
                    font-family:'Cormorant Garamond', Georgia, serif;
                    font-size:11px;
                    font-weight:400;
                    letter-spacing:0.48em;
                    text-transform:uppercase;
                    padding-left:0.48em;
                  "
                >
                  1933
                </div>
              </td>
              <td style="vertical-align:top; border-left:1px solid #d7e4ef; padding-left:22px;">
                <div style="font-family:Arial, Helvetica, sans-serif; font-size:20px; font-weight:600; line-height:1.15; color:#2e2a24;">
                  Oficina
                </div>
                <div
                  style="
                    margin-top:3px;
                    font-family:Arial, Helvetica, sans-serif;
                    font-size:11px;
                    font-weight:700;
                    letter-spacing:0.14em;
                    text-transform:uppercase;
                    color:#2f6fa3;
                  "
                >
                  Montornes del Valles
                </div>
                <div
                  style="
                    margin-top:12px;
                    font-family:Arial, Helvetica, sans-serif;
                    font-size:13px;
                    line-height:1.65;
                    color:#31465a;
                  "
                >
                  <div><span style="color:#2f6fa3;">E</span> office@forne.family</div>
                  <div><span style="color:#2f6fa3;">W</span> www.forne.family</div>
                  <div><span style="color:#2f6fa3;">A</span> Barcelona, Spain</div>
                </div>
                <div
                  style="
                    margin-top:12px;
                    font-family:Arial, Helvetica, sans-serif;
                    font-size:11px;
                    line-height:1.45;
                    color:#5f7487;
                    max-width:280px;
                  "
                >
                  Hospitalidad e identidad familiar expresados con calma, elegancia e intención.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
